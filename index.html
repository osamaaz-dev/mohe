<!DOCTYPE html>
<html lang="ar">

<head>
  <meta charset="UTF-8">
  <title>مولد تصاميم الأخبار</title>
  <link href="images/logo.svg" rel="icon">
  <link rel="stylesheet" href="style.css">
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>

<body>
  <h2 class="main-title">مولد تصاميم الأخبار</h2>
  <h3 class="sub-title">وزارة التعليم العالي و البحث العلمي</h3>

  <div class="main-container">

    <div class="sidebar-controls">
      <div class="input-group">
        <input type="text" id="titleInput" placeholder="عنوان الخبر" style="font-family:'QomraLight'">
        <textarea id="contentInput" placeholder="نص الخبر" style="font-family:'QomraLight'"></textarea>
      </div>

      <div class="template-grid">
        <img src="templates/1.png" onclick="setTemplate('1.png','layout1', this)">
        <img src="templates/2.jpg" onclick="setTemplate('2.jpg','layout2', this)">
        <img src="templates/3.jpg" onclick="setTemplate('3.jpg','layout3', this)">
        <img src="templates/4.jpg" onclick="setTemplate('4.jpg','layout4', this)">
        <img src="templates/5.jpg" onclick="setTemplate('5.jpg','layout5', this)">
        <img src="templates/6.jpg" onclick="setTemplate('6.jpg','layout6', this)">
        <img src="templates/7.jpg" onclick="setTemplate('7.jpg','layout7', this)">
        <img src="templates/8.jpg" onclick="setTemplate('8.jpg','layout8', this)">
        <img src="templates/9.jpg" onclick="setTemplate('9.jpg','layout9', this)">
        <img src="templates/10.jpg" onclick="setTemplate('10.jpg','layout10', this)">
        <img src="templates/11.jpg" onclick="setTemplate('11.jpg','layout11', this)">

      </div>

      <div class="font-controls">
        <div class="control-item">
          <label>حجم العنوان</label>
          <input type="range" min="30" max="150" value="70" id="titleSize" oninput="changeTitleSize(this.value)">
        </div>

        <div class="control-item">
          <label>حجم النص</label>
          <input type="range" min="10" max="100" value="40" id="contentSize" oninput="changeContentSize(this.value)">
        </div>

        <div class="control-item">
          <label>تحريك النص عمودياً</label>
          <input type="range" min="-500" max="1000" value="500" id="verticalPosition" oninput="moveText(this.value)">
        </div>
        <div class="control-item">
          <label>مستوى الكشيدة (التطويل)</label>
          <input type="range" min="0" max="20" value="0" id="kashidaLevel" oninput="updateKashida(this.value)">
        </div>
        <div class="control-item">
          <label>تباعد الكلمات</label>
          <input type="range" min="-10" max="50" value="0" id="wordSpacing" oninput="changeWordSpacing(this.value)">
        </div>
        <div class="control-item">
          <label>ارتفاع السطر</label>
          <input type="range" min="1" max="2.5" step="0.1" value="1.6" id="lineHeight"
            oninput="changeLineHeight(this.value)">
        </div>
      </div>
      <div class="control-item" style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
        <input type="checkbox" id="alignLastCheck" onchange="toggleAlignLast(this.checked)"
          style="width: 20px; height: 20px; cursor: pointer;">
        <label style="margin-bottom: 0;">محاذاة السطر الأخير لليسار (End)</label>
      </div>
      <div class="action-buttons">
        <button onclick="generate()">تحديث النص</button>
        <button onclick="download()">تحميل الصورة</button>
        <button onclick="sendToTelegram()" style="background: #0088cc; width: 70px;">إرسال لتلغرام</button>
      </div>
    </div>

    <div class="preview-section">
      <div class="preview-frame">
        <div id="design">
          <div class="overlay">
            <h1 id="newsTitle">عنوان الخبر</h1>
            <p id="newsContent">نحن هنا لنبني جسوراً من المعرفة تربط بين الشغف والإنجاز، حيث تتحول المعلومة المجردة إلى
              مهارة ملموسة تفتح أبواب المستقبل</p>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    // المتغير العالمي لتخزين النص الأصلي بدون كشيدات لضمان دقة المعالجة
    let originalContent = "";

    function applySmartKashida(text, level) {
      if (!text || level == 0) return text;

      const kashidaChar = "ـ".repeat(level); // تكرار الكشيدة بناءً على قيمة السلايدر
      const connectableRegex = /[بتثجحخسشصضطظعغفقكلمنهيئ]/;

      return text.split(' ').map(word => {
        if (word.length < 4) return word; // الكلمات القصيرة جداً لا تُطول (أقل من 4 حروف)

        let positions = [];
        for (let i = 0; i < word.length - 1; i++) {
          // التحقق من إمكانية الوصل بين الحرف الحالي والحالي
          if (connectableRegex.test(word[i])) {
            // حظر الكشيدة بين ل و ا في (لا) أو أي تنوع لها
            if (word[i] === 'ل' && ['ا', 'أ', 'إ', 'آ'].includes(word[i + 1])) {
              continue;
            }
            positions.push(i);
          }
        }

        if (positions.length > 0) {
          // تجنب وضع الكشيدة في آخر حرف قابل للاتصال بالكلمة إذا توفرت خيارات اتصال أخرى
          let candidates = positions;
          if (positions.length > 1) {
            candidates = positions.slice(0, -1);
          }

          // اختيار الموضع الأقرب لمنتصف الكلمة لضمان التوازن والجمالية البصرية
          let middle = word.length / 2;
          let bestPos = candidates[0];
          let minDiff = Math.abs(bestPos - middle);

          for (let j = 1; j < candidates.length; j++) {
            let diff = Math.abs(candidates[j] - middle);
            if (diff < minDiff) {
              minDiff = diff;
              bestPos = candidates[j];
            }
          }

          return word.slice(0, bestPos + 1) + kashidaChar + word.slice(bestPos + 1);
        }
        return word;
      }).join(' ');
    }

    // دالة التحديث عند تحريك السلايدر
    function updateKashida(level) {
      const contentVal = document.getElementById("contentInput").value || "نص الخبر سيظهر هنا...";
      const processedText = applySmartKashida(contentVal, parseInt(level));
      document.getElementById("newsContent").innerText = processedText;
    }

    // دالة generate الموحدة والذكية التي تدعم الكشيدة تلقائياً
    function generate() {
      const titleVal = document.getElementById("titleInput").value;
      const contentVal = document.getElementById("contentInput").value;
      const kashidaLevel = document.getElementById("kashidaLevel").value;

      document.getElementById("newsTitle").innerText = titleVal || "عنوان الخبر";

      // تطبيق الكشيدة فوراً بناءً على مستوى السلايدر الحالي عند الضغط على زر التحديث
      const processedText = applySmartKashida(contentVal || "نص الخبر سيظهر هنا...", parseInt(kashidaLevel));
      document.getElementById("newsContent").innerText = processedText;
    }

    function setTemplate(imageName, layoutClass, element) {
      const design = document.getElementById("design");
      const verticalSlider = document.getElementById("verticalPosition");
      const overlay = document.querySelector(".overlay");

      //تغيير القالب والكلاس
      design.style.backgroundImage = "url('templates/" + imageName + "')";
      design.className = "";
      design.classList.add(layoutClass);

      //إعادة ضبط شريط التمرير للقيمة المتوسطة (أو الصفر حسب رغبتك)
      // هنا سنعيده للقيمة 500 وهي القيمة الافتراضية في الـ HTML لديك
      verticalSlider.value = 500;

      //مسح الإزاحة اليدوية التي تمت برمجياً ليعود القالب لإحداثيات الأساسية
      overlay.style.top = "";

      // إعادة ضبط قيم التباعد وارتفاع الأسطر الافتراضية عند تغيير القالب لضمان التناسق
      document.getElementById("wordSpacing").value = 0;
      document.getElementById("lineHeight").value = 1.6;
      document.getElementById("newsContent").style.wordSpacing = "0px";
      document.getElementById("newsContent").style.lineHeight = "1.6";

      // 4. تحديث حالة الصور المصغرة
      document.querySelectorAll(".template-grid img").forEach(img => img.classList.remove("active"));
      if (element) element.classList.add("active");
    }

    function download() {
      const design = document.getElementById("design");
      const title = document.getElementById("titleInput").value || "news";
      let fileName = title.replace(/[\\/:*?"<>|]/g, "").replace(/\s+/g, "_");

      // تصفير التحجيم مؤقتاً للتصدير بدقة عالية
      const originalTransform = design.style.transform;
      design.style.transform = "none";

      html2canvas(design, { width: 1080, height: 1350, scale: 1 }).then(canvas => {
        let link = document.createElement("a");
        link.download = fileName + ".png";
        link.href = canvas.toDataURL("image/png");
        link.click();
        design.style.transform = originalTransform;
      });
    }

    function changeTitleSize(size) { document.getElementById("newsTitle").style.fontSize = size + "px"; }
    function changeContentSize(size) { document.getElementById("newsContent").style.fontSize = size + "px"; }
    function moveText(value) { document.querySelector(".overlay").style.top = value + "px"; }
    function changeWordSpacing(value) { document.getElementById("newsContent").style.wordSpacing = value + "px"; }
    function changeLineHeight(value) { document.getElementById("newsContent").style.lineHeight = value; }

    function scalePreview() {
      const frame = document.querySelector(".preview-frame");
      const design = document.getElementById("design");
      const scale = frame.clientWidth / 1080;
      design.style.transform = "scale(" + scale + ")";
    }

    window.onload = function () {
      scalePreview();
      const firstTemp = document.querySelector(".template-grid img");
      if (firstTemp) firstTemp.click();
    };
    window.onresize = scalePreview;
    async function sendToTelegram() {
      const design = document.getElementById("design");
      const botToken = "8320697814:AAGq5UTVDyzTWnL1FmiKHomrgKst7ddVsFM"; // ضع هنا التوكن الخاص بالبوت
      const chatId = "-1003557221315";     // ضع هنا معرف الشات

      // تصفير التحجيم مؤقتاً للتصدير بدقة 1080p كما في وظيفة التحميل
      const originalTransform = design.style.transform;
      design.style.transform = "none";

      try {
        const canvas = await html2canvas(design, {
          width: 1080,
          height: 1350,
          scale: 1,
          useCORS: true // مهم إذا كانت الصور من روابط خارجية
        });

        // تحويل الكانفاس إلى ملف (Blob)
        canvas.toBlob(async (blob) => {
          const formData = new FormData();
          formData.append("chat_id", chatId);
          formData.append("photo", blob, "design.png");
          formData.append("caption", "تم إنشاء تصميم جديد بواسطة مولد الأخبار ✅");

          const response = await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
            method: "POST",
            body: formData
          });

          const result = await response.json();
          if (result.ok) {
            alert("تم إرسال التصميم بنجاح إلى تلغرام!");
          } else {
            alert("حدث خطأ أثناء الإرسال: " + result.description);
          }
        }, "image/png");

      } catch (error) {
        console.error("Telegram Error:", error);
        alert("فشل في معالجة الصورة قبل الإرسال.");
      } finally {
        // إعادة التحجيم للمعاينة
        design.style.transform = originalTransform;
      }
    }
    function toggleAlignLast(isChecked) {
      const newsContent = document.getElementById("newsContent");
      if (isChecked) {
        newsContent.style.textAlignLast = "justify";
      } else {
        newsContent.style.textAlignLast = "auto";
      }
    }
    // https://api.telegram.org/bot[حط هون الID دون الاقواس]/getUpdates مشان تعرف الID

    // ID قسم الانتاج :   
    //-1003557221315

    // ID أســــــامة :   
    // 864990198


  </script>
</body>

</html>
